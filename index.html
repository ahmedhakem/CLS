<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Prices</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    text-align:center;
}

.card h2{
    color:#555;
    margin-bottom:10px;
}

.price{
    font-size:28px;
    font-weight:bold;
    color:#2196F3;
}

.time{
    text-align:center;
    margin-top:30px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

<h1>💱 Live Currency Prices</h1>

<div class="grid" id="rates">
Loading...
</div>

<div class="time" id="updated"></div>

</div>

<script>

const currencies = [
    "USD",
    "EUR",
    "GBP",
    "SAR",
    "AED",
    "JPY",
    "CNY",
    "TRY"
];

async function loadRates(){

    try{

        const response = await fetch("https://open.er-api.com/v6/latest/EGP");
        const data = await response.json();

        let html = "";

        currencies.forEach(currency=>{

            const rate = data.rates[currency];

            html += `
            <div class="card">
                <h2>${currency}</h2>
                <div class="price">${rate.toFixed(4)}</div>
                <small>1 EGP = ${rate.toFixed(4)} ${currency}</small>
            </div>
            `;

        });

        document.getElementById("rates").innerHTML = html;

        document.getElementById("updated").innerHTML =
            "Last Updated: " + new Date(data.time_last_update_utc).toLocaleString();

    }
    catch(e){
        document.getElementById("rates").innerHTML =
        "<h3>Unable to load exchange rates.</h3>";
    }

}

loadRates();

// Refresh every minute
setInterval(loadRates,60000);

</script>

</body>
</html>
